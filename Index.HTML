<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="Style.css">
    <head>
    <!-- Favicon Icon -->
    <link rel="icon" type="image/png" href="RPS.png">

    <link rel="stylesheet" href="Style.css">
</head>
</head>
<body>

    <h1 id="heading">Rock Paper Scissors 
    
    </h1>

  <div class="toggle-container">
    <span>Dark Mode</span>
    <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
    </label>
  
</div>

    <div class="div-container">
        <div class="circle" id="rock"><img src=" rock.png" ></div>
        <div class="circle" id="paper"><img src="paper.png" ></div>
        <div class="circle" id="scissors"><img src="scissors.png" ></div>
    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>You</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>comp</p>

        </div>
    </div>

       <div class="User-Msg">
    <p>You played: <span id="User-Msg"></span></p>
</div>

<div class="Comp-Msg">
    <p>Computer played: <span id="Comp-Msg"></span></p>
</div>

    <div class="msg-container">
        <p id="msg">Play your move</p>
    </div>



    <script src="App.js"></script>
</body>
</html>
